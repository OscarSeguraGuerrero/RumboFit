<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RumboFit</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7a00, #ffd000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* CARD */
        .card {
            background: #f3f3f3;
            padding: 35px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* LOGO */
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo img {
            width: 250px;
        }

        h2 {
            text-align: center;
            color: #ff7a00;
            margin: 5px 0;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        /* LABEL */
        label {
            font-size: 14px;
            color: #333;
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 12px;
            margin: 5px 0 15px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
        }

        /* BOTÓN */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff7a00, #ffb300);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* TEXTO CAMBIO */
        .switch {
            text-align: center;
            margin-top: 15px;
            color: #ff7a00;
            cursor: pointer;
        }

        /* ERROR */
        .error {
            color: red;
            font-size: 14px;
            text-align: center;
        }

        /* OCULTO */
        .hidden {
            display: none;
        }
    </style>
</head>

<body>
<!-- LOGIN -->
<div id="login" class="card hidden">

    <div class="logo">
        <img src="./images/logo1.png" alt="logo">
    </div>

    <p class="subtitle">Tu entrenador personal digital</p>

    <label>Email</label>
    <input id="loginEmail" placeholder="tu@email.com">

    <label>Contraseña</label>
    <input id="loginPassword" type="password" placeholder="••••••••">

    <p id="errorLogin" class="error"></p>

    <button onclick="login()">Iniciar Sesión</button>

    <p class="switch" onclick="mostrarRegistro()">
        ¿No tienes cuenta? Regístrate
    </p>
</div>
<!-- REGISTRO -->
<div id="registro" class="card">

    <div class="logo">
        <img src="./images/logo1.png" alt="logo">
    </div>

    <p class="subtitle">Tu entrenador personal digital</p>

    <label>Nombre</label>
    <input id="nombre" placeholder="Tu nombre">

    <label>Email</label>
    <input id="email" placeholder="tu@email.com">

    <label>Contraseña</label>
    <input id="password" type="password" placeholder="••••••••">

    <p id="errorRegistro" class="error"></p>

    <button onclick="registrar()">Registrarse</button>

    <p class="switch" onclick="mostrarLogin()">
        ¿Ya tienes cuenta? Inicia sesión
    </p>
</div>



<script>
    // CAMBIAR VISTAS
    function mostrarLogin() {
        document.getElementById("registro").classList.add("hidden");
        document.getElementById("login").classList.remove("hidden");
    }

    function mostrarRegistro() {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("registro").classList.remove("hidden");
    }

    // LOGIN
    function login() {
        let email = document.getElementById("loginEmail").value;
        let password = document.getElementById("loginPassword").value;

        let usuario = JSON.parse(localStorage.getItem("usuario"));

        if (!usuario) {
            document.getElementById("errorLogin").innerText = "No hay usuarios registrados";
            return;
        }

        if (usuario.email !== email || usuario.password !== password) {
            document.getElementById("errorLogin").innerText = "Credenciales incorrectas";
            return;
        }

        alert("Login correcto 🔥");
    }
    // REGISTRO
    function registrar() {
        let nombre = document.getElementById("nombre").value;
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        if (!nombre || !email || !password) {
            document.getElementById("errorRegistro").innerText = "Completa todos los campos";
            return;
        }

        let usuario = { nombre, email, password };

        localStorage.setItem("usuario", JSON.stringify(usuario));

        alert("Usuario registrado correctamente");

        mostrarLogin();
    }


</script>

</body>
</html>
